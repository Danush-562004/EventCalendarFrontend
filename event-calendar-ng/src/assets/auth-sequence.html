<text x="837" y="355" text-anchor="middle" fill="#94a3b8" font-size="10">false (not taken)</text>

<!-- 7. Check email exists -->
<line x1="760" y1="375" x2="915" y2="375" stroke="#60a5fa" stroke-width="1.5" marker-end="url(#arr)"/>
<text x="837" y="368" text-anchor="middle" fill="#7dd3fc" font-size="11">EmailExistsAsync()</text>
<line x1="920" y1="390" x2="765" y2="390" stroke="#94a3b8" stroke-width="1" stroke-dasharray="5,3" marker-end="url(#arr-ret)"/>
<text x="837" y="405" text-anchor="middle" fill="#94a3b8" font-size="10">false (not taken)</text>

<text x="837" y="445" text-anchor="middle" fill="#64748b" font-size="10">PBKDF2 hash + salt generated</text>

<!-- 9. Save user to DB -->
<line x1="760" y1="485" x2="915" y2="485" stroke="#60a5fa" stroke-width="1.5" marker-end="url(#arr)"/>
<text x="837" y="478" text-anchor="middle" fill="#7dd3fc" font-size="11">AddAsync(user)</text>
<line x1="920" y1="500" x2="765" y2="500" stroke="#94a3b8" stroke-width="1" stroke-dasharray="5,3" marker-end="url(#arr-ret)"/>
<text x="837" y="515" text-anchor="middle" fill="#94a3b8" font-size="10">createdUser (with Id)</text>

<!-- 10. Log audit -->
<rect x="735" y="525" width="50" height="22" rx="4" fill="#1e293b" stroke="#334155" stroke-width="1"/>

<text x="837" y="555" text-anchor="middle" fill="#64748b" font-size="10">action: "Register", entity: "User"</text>

<!-- 11. GenerateToken -->
<rect x="735" y="570" width="50" height="22" rx="4" fill="#1e3a5f" stroke="#0071e3" stroke-width="1"/>
<text x="760" y="585" text-anchor="middle" fill="#7dd3fc" font-size="10">GenerateToken()</text>
<text x="837" y="600" text-anchor="middle" fill="#64748b" font-size="10">JWT signed with HS256, 24h expiry</text>

<!-- 12. Return AuthResponseDto -->
<line x1="760" y1="640" x2="605" y2="640" stroke="#94a3b8" stroke-width="1" stroke-dasharray="5,3" marker-end="url(#arr-ret)"/>
<text x="677" y="633" text-anchor="middle" fill="#94a3b8" font-size="11">{ token, expiry, user }</text>

<!-- 13. 201 Created -->
<line x1="600" y1="695" x2="425" y2="695" stroke="#94a3b8" stroke-width="1" stroke-dasharray="5,3" marker-end="url(#arr-ret)"/>
<text x="507" y="688" text-anchor="middle" fill="#94a3b8" font-size="11">201 Created { token, expiry, user }</text>

<!-- 14. Store token, navigate -->
<line x1="420" y1="745" x2="245" y2="745" stroke="#94a3b8" stroke-width="1" stroke-dasharray="5,3" marker-end="url(#arr-ret)"/>
<text x="328" y="738" text-anchor="middle" fill="#94a3b8" font-size="11">AuthResponse</text>
<rect x="215" y="755" width="50" height="22" rx="4" fill="#1e3a5f" stroke="#0071e3" stroke-width="1"/>
<text x="240" y="770" text-anchor="middle" fill="#7dd3fc" font-size="10">setAuth()</text>
<text x="155" y="790" text-anchor="middle" fill="#64748b" font-size="10">store JWT in localStorage → navigate /dashboard</text>

<!-- Error alt box -->
<rect x="535" y="295" width="430" height="55" rx="6" fill="none" stroke="#f87171" stroke-width="1" stroke-dasharray="4,3"/>

<text x="545" y="328" fill="#f87171" font-size="11">throw DuplicateEntityException → 409 Conflict</text>
<text x="545" y="343" fill="#f87171" font-size="10">Angular shows toast error</text>

<text x="760" y="256" fill="#94a3b8" font-size="10">unique_name : username</text>
<text x="760" y="272" fill="#94a3b8" font-size="10">role : "User" | "Admin"</text>

<text x="760" y="304" fill="#94a3b8" font-size="10">exp  : now + 24h</text>

<script>
function show(tab, btn) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('panel-' + tab).classList.add('active');
  btn.classList.add('active');
}
</script>
