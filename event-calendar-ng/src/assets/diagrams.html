<!DOCTYPE html>

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f0f1a; color: #e2e8f0; }
h1 { text-align: center; padding: 2rem 1rem .5rem; font-size: 1.75rem; font-weight: 800; color: #fff; letter-spacing: -.03em; }
.subtitle { text-align: center; color: #64748b; font-size: .9rem; margin-bottom: 2rem; }
.tabs { display: flex; justify-content: center; gap: .5rem; margin-bottom: 2rem; }
.tab { padding: .5rem 1.5rem; border-radius: 980px; border: 1px solid #334155; background: none; color: #94a3b8; cursor: pointer; font-size: .875rem; font-weight: 600; transition: all .2s; }
.tab.active { background: #0071e3; border-color: #0071e3; color: #fff; }
.panel { display: none; padding: 0 1.5rem 4rem; }
.panel.active { display: block; }
.diagram-wrap { overflow-x: auto; }
svg text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', monospace; }

/* Class box styles */
.cls-box { fill: #1e293b; stroke: #334155; stroke-width: 1.5; rx: 8; }
.cls-header { fill: #0071e3; }
.cls-header-abstract { fill: #7c3aed; }
.cls-header-interface { fill: #0891b2; }
.cls-header-enum { fill: #b45309; }
.cls-title { fill: #fff; font-weight: 700; font-size: 13px; }
.cls-stereotype { fill: rgba(255,255,255,.6); font-size: 10px; }
.cls-attr { fill: #94a3b8; font-size: 11px; }
.cls-method { fill: #7dd3fc; font-size: 11px; }
.cls-sep { stroke: #334155; stroke-width: 1; }
.rel-line { stroke: #475569; stroke-width: 1.5; fill: none; }
.rel-arrow { fill: #475569; }
.rel-label { fill: #94a3b8; font-size: 10px; }
.rel-compose { fill: #0071e3; stroke: #0071e3; }
.rel-inherit { fill: none; stroke: #7c3aed; stroke-width: 1.5; }
</style>
</head>
